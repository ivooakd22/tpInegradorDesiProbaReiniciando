<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Factura')}"></head>

<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="d-flex align-items-center mb-4">
                    <a href="/facturas" class="btn btn-outline-secondary btn-sm me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2 class="mb-0" th:text="${titulo}">Facturas</h2>
                </div>

                <div class="card">
                    <div class="card-body p-4">

                        <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3"
                            role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span th:text="${mensajeError}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{${formAction}}" th:object="${factura}" method="post">
							
							                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
