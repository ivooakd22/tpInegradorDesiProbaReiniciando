<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

	<head th:replace="~{fragments/layout :: head('Factura')}"></head>
	
	<body>
	
		<nav th:replace="~{fragments/layout :: navbar}"></nav>
	
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-8">
	
					<div class="d-flex align-items-center mb-4">
						<a href="/facturas" class="btn btn-outline-secondary btn-sm me-3">
							<i class="bi bi-arrow-left"></i>
						</a>
						<h2 class="mb-0" th:text="${titulo}">Factura</h2>
					</div>
					<div class="card">
						<div class="card-body p-4">
							<div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3"
								role="alert">
								<i class="bi bi-exclamation-triangle me-2"></i>
								<span th:text="${mensajeError}"></span>
								<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
							</div>
							<form th:action="@{${formAction}}" th:object="${factura}" method="post">
								<div class="row mb-3">
									<div class="col-md-4" th:if="${factura.id != null}">
										<label class="form-label fw-semibold">ID</label>
										<input type="text" th:field="*{id}" class="form-control" readonly>
										<input type="hidden" th:field="*{id}">
									</div>															
									<div class="col-md-4" th:if="${factura.id == null}">
										<label class="form-label fw-semibold">Contrato <span
												class="text-danger">*</span></label>
										<select class="form-select" th:field="*{contrato.id}" required>
											<option value="">-- Seleccionar Contrato --</option>
											<option th:each="con : ${contratos}" th:value="${con.id}"
												th:text="${con.propiedadDireccion}">
											</option>
										</select>
									</div>	
									<div class="col-md-4" th:if="${factura.id != null}">
										<label class="form-label fw-semibold">Contrato</label>
										<input type="text" class="form-control"
											th:value="${factura.contrato.propiedadDireccion}" readonly>
										<input type="hidden" th:field="*{contrato.id}">
									</div>								
									<div class="col-md-4">								
		                                <label class="form-label fw-semibold">Importe<span
		                                        class="text-danger">*</span></label>
		                                <input type="text" class="form-control" th:field="*{importe}" required
		                                    placeholder="Ej: 10000">								                                
									</div>								
									<div class="col-md-4">
										<label class="form-label fw-semibold">Estado <span
												class="text-danger">*</span></label>
										<select class="form-select" th:field="*{estado}" required>
											<option value="">-- Seleccionar --</option>
											<option th:each="e : ${estados}" th:value="${e}" th:text="${e}">
											</option>
										</select>
									</div>
								</div>
								<div class="row mb-3">
									<div class="col-md-4">
										<label class="form-label fw-semibold">Fecha Emision <span
												class="text-danger">*</span></label>
										<input type="date" step="1" min="1" class="form-control" th:field="*{fechaEmision}"
											required>
									</div>
									<div class="col-md-4">
										<label class="form-label fw-semibold">Fecha Vencimiento <span
												class="text-danger">*</span></label>
										<input type="date" step="1" min="1" class="form-control"
											th:field="*{fechaVencimiento}" required>
									</div>								
									<div class="col-md-4">
										<label class="form-label fw-semibold">Concepto Facturado <span
												class="text-danger">*</span></label>
										<input type="text" class="form-control" th:field="*{concepto}"
											placeholder="Ej: Pago Boleta" required>
									</div>
								</div>
								<div class="row mb-3">								
									<div class="col-md-4">
										<label class="form-label fw-semibold">Medio de Pago</label>
										<select class="form-select" th:field="*{medioPago}">
											<option value="">-- Seleccionar --</option>
											<option th:each="e : ${mediosPago}" th:value="${e}" th:text="${e}">
											</option>
										</select>
									</div>								
									<div class="col-md-4">								
		                                <label class="form-label fw-semibold">Importe Pagado</label>
		                                <input type="text" class="form-control" th:field="*{importePagado}"
		                                    placeholder="Ej: 10000">								                                
									</div>								
									<div class="col-md-4">								
					                    <label class="form-label fw-semibold">Interes</label>
					                    <input type="text" class="form-control" th:field="*{interes}"
					                        placeholder="Ej: 120">								                                
									</div>
								</div>
								<div class="row mb-3">	
									<div class="col-md-4">
										<label class="form-label fw-semibold">Fecha Pago</label>
										<input type="date" step="1" min="1" class="form-control"
											th:field="*{fechaPago}">
										</div>
								</div>
								<div class="d-flex gap-2">
									<button type="submit" class="btn btn-primary">
										<i class="bi bi-floppy me-1"></i> Guardar
									</button>
									<a href="/facturas" class="btn btn-outline-secondary">
										<i class="bi bi-x-lg me-1"></i> Cancelar
									</a>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div th:replace="~{fragments/layout :: scripts}"></div>
	</body>
</html>
