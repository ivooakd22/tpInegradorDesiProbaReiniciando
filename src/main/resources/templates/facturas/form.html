<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Factura')}"></head>

<body>

	<nav th:replace="~{fragments/layout :: navbar}"></nav>

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-lg-8">

				<div class="d-flex align-items-center mb-4">
					<a href="/facturas/nuevo" class="btn btn-outline-secondary btn-sm me-3">
						<i class="bi bi-arrow-left"></i>
					</a>
					<h2 class="mb-0" th:text="${titulo}">Factura</h2>
				</div>

				<div class="card">
					<div class="card-body p-4">

						<div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3"
							role="alert">
							<i class="bi bi-exclamation-triangle me-2"></i>
							<span th:text="${mensajeError}"></span>
							<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
						</div>

						<form th:action="@{${formAction}}" th:object="${factura}" method="post">

							<div class="col-md-4" th:if="${factura.id != null}">
								<label class="form-label fw-semibold">ID</label>
								<input type="text" th:field="*{id}" class="form-control" readonly>
								<input type="hidden" th:field="*{id}">
							</div>

							<div class="row mb-3">
								<div class="col-md-4">
									<label class="form-label fw-semibold">Importe <span
											class="text-danger">*</span></label>
									<input type="number" class="form-control" th:field="*{importe}"
										placeholder="Ej: 123" required>
								</div>

								<div class="col-md-4">
									<label class="form-label fw-semibold">Fecha Vencimiento <span
											class="text-danger">*</span></label>
									<input type="date" step="1" min="1" class="form-control"
										th:field="*{fechaVencimiento}" required>
								</div>

								<div class="col-md-4">
									<label class="form-label fw-semibold">Concepto <span
											class="text-danger">*</span></label>
									<input type="text" class="form-control"
										th:field="*{concepto}" required>
								</div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-primary">
									<i class="bi bi-floppy me-1"></i> Guardar
								</button>
								<a href="/facturas" class="btn btn-outline-secondary">
									<i class="bi bi-x-lg me-1"></i> Cancelar
								</a>
							</div>

						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
