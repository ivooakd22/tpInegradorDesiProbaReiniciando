<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Publicaciones')}"></head>

<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-megaphone me-2"></i>Facturas</h2>
            <a href="/facturas/nuevo" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> Nueva Factura
            </a>
        </div>

        <form th:action="@{/facturas}" method="get" class="row g-3 mb-4">
            <!-- Contrato -->
            <div class="col-md-3">
                <label for="contratoId" class="form-label">Contrato</label>
                <select id="contratoId" name="contratoId" class="form-select">
                    <option value="">-- Todas --</option>
                    <option th:each="con : ${contratos}" th:value="${con.id}"
                        th:text="|${con.fechaInicio}, ${prop.fechaFin}|">
                    </option>
                </select>
            </div>

            

            <!-- Botón -->
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Filtrar</button>
            </div>
        </form>


        <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span th:text="${mensajeError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>       
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
