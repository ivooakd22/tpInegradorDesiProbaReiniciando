<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Publicacion')}"></head>

<body>

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="d-flex align-items-center mb-4">
                    <a href="/publicaciones" class="btn btn-outline-secondary btn-sm me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2 class="mb-0" th:text="${titulo}">Publicación</h2>
                </div>

                <div class="card">
                    <div class="card-body p-4">

                        <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3"
                            role="alert">
                            <i class="bi bi-exclamation-triangle me-2"></i>
                            <span th:text="${mensajeError}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{${formAction}}" th:object="${publicacion}" method="post">

                            <div class="col-md-4" th:if="${publicacion.id != null}">
                                <label class="form-label fw-semibold">ID</label>
                                <input type="text" th:field="*{id}" class="form-control" readonly>
                                <input type="hidden" th:field="*{id}">
                            </div>

                            <div class="mb-3" th:if="${publicacion.id == null}">
                                <label class="form-label fw-semibold">Propiedad <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{propiedad.id}" required>
                                    <option value="">-- Seleccionar Propiedad --</option>
                                    <option th:each="prop : ${propiedades}" th:value="${prop.id}"
                                        th:text="${prop.direccion}">
                                    </option>
                                </select>
                                <div class="form-text">Si no hay propiedades disponibles, agregue uno primero via SQL.
                                </div>
                            </div>

                            <!-- Si es edición, mostrar la propiedad en solo lectura -->
                            <div class="col-md-6" th:if="${publicacion.id != null}">
                                <label class="form-label fw-semibold">Propiedad</label>
                                <input type="text" class="form-control" th:value="${publicacion.propiedad.direccion}"
                                    readonly>
                                <input type="hidden" th:field="*{propiedad.id}">
                            </div>

                            <div class="row mb-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Precio Mensual <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{precioMensual}"
                                        placeholder="Ej: 10000" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Condiciones <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{condiciones}"
                                        placeholder="Ej: depósito, garantía, si acepta mascotas, etc." required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Descripcion <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="*{descripcion}"
                                        placeholder="Ej: Descripción de la propiedad" required>
                                </div>
                            </div>

                            <div class="row mb-3">

                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Estado <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" th:field="*{estado}" required>
                                        <option value="">-- Seleccionar --</option>
                                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Fecha <span
                                            class="text-danger">*</span></label>
                                    <input type="date" step="1" min="1" class="form-control"
                                        th:field="*{fechaPublicacion}" required>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-floppy me-1"></i> Guardar
                                </button>
                                <a href="/publicaciones" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-lg me-1"></i> Cancelar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
