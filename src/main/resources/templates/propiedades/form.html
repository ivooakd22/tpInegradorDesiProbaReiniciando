<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Propiedad')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex align-items-center mb-4">
                <a href="/propiedades" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="mb-0" th:text="${titulo}">Propiedad</h2>
            </div>

            <div class="card">
                <div class="card-body p-4">

                    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span th:text="${mensajeError}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{${formAction}}" th:object="${propiedad}" method="post">

                        <div class="row mb-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Dirección <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{direccion}"
                                       placeholder="Ej: Av. Corrientes 1234" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Barrio</label>
                                <input type="text" class="form-control" th:field="*{barrio}"
                                       placeholder="Ej: Palermo">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Ciudad <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{ciudad}"
                                       placeholder="Ej: Buenos Aires" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{tipo}" required>
                                    <option value="">-- Seleccionar --</option>
                                    <option th:each="t : ${tipos}"
                                            th:value="${t}"
                                            th:text="${t}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Estado</label>
                                <select class="form-select" th:field="*{estado}">
                                    <option value="">-- Seleccionar --</option>
                                    <option th:each="e : ${estados}"
                                            th:value="${e}"
                                            th:text="${e}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Metros Cuadrados <span class="text-danger">*</span></label>
                                <input type="number" step="1" min="1" class="form-control"
                                       th:field="*{metrosCuadrados}"
                                       placeholder="Ej: 75" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Propietario <span class="text-danger">*</span></label>
                            <select class="form-select" name="propietarioId" required>
                                <option value="">-- Seleccionar Propietario --</option>
                                <option th:each="prop : ${propietarios}"
                                        th:value="${prop.id}"
                                        th:text="${prop.nombre + ' ' + prop.apellido + ' (DNI: ' + prop.dni + ')'}"
                                        th:selected="${propietarioSeleccionado != null and propietarioSeleccionado == prop.id}">
                                </option>
                            </select>
                            <div class="form-text">Si no hay propietarios disponibles, agregue uno primero via SQL.</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Ambientes <span class="text-danger">*</span></label>
                            <input type="number" min="1" class="form-control" th:field="*{ambientes}"
                                   placeholder="Ej: 3" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i> Guardar
                            </button>
                            <a href="/propiedades" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i> Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
