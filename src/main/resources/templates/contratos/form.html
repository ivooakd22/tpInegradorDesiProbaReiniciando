<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contrato')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/contratos}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="mb-0" th:text="${titulo}">Registrar Contrato</h2>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <span th:text="${mensajeError}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="${formAction}" th:object="${contrato}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Propiedad <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{propiedadId}" required>
                                <option value="">-- Seleccionar Propiedad --</option>
                                <th:block th:if="${propiedades != null}">
                                    <option th:each="prop : ${propiedades}"
                                            th:value="${prop.id}"
                                            th:text="${prop.direccion + ' (' + prop.ciudad + ')'}">
                                    </option>
                                </th:block>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Inquilino <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{inquilinoId}" required>
                                <option value="">-- Seleccionar Inquilino --</option>
                                <th:block th:if="${inquilinos != null}">
                                    <option th:each="inq : ${inquilinos}"
                                            th:value="${inq.id}"
                                            th:text="${inq.nombre + ' ' + inq.apellido + ' (DNI: ' + inq.dni + ')'}">
                                    </option>
                                </th:block>
                            </select>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Fecha de Inicio <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" th:field="*{fechaInicio}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Duración (Meses) <span class="text-danger">*</span></label>
                                <input type="number" min="1" class="form-control" th:field="*{duracionMeses}" placeholder="Ej: 12" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Monto Mensual ($) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" min="1" class="form-control" th:field="*{montoMensual}" placeholder="Ej: 250000" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Día de Pago (1-31) <span class="text-danger">*</span></label>
                                <input type="number" min="1" max="31" class="form-control" th:field="*{diaPago}" placeholder="Ej: 5" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Estado <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{estado}" required>
                                    <option value="">-- Seleccionar --</option>
                                    <th:block th:if="${estados != null}">
                                        <option th:each="e : ${estados}"
                                                th:value="${e}"
                                                th:text="${e}">
                                        </option>
                                    </th:block>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Descripción / Observaciones <span class="text-danger">*</span></label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}" placeholder="Detalles del contrato..." required></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-floppy me-1"></i> Guardar Contrato
                            </button>
                            <a th:href="@{/contratos}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i> Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
