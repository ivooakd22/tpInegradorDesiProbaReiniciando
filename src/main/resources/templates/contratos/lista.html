<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contratos')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Listado de Contratos</h2>
        <a th:href="@{/contratos/nuevo}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Nuevo Contrato
        </a>
    </div>

    <!-- Mensajes -->
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tabla -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Propiedad</th>
                        <th>Inquilino</th>
                        <th>Fecha Inicio</th>
                        <th>Duración</th>
                        <th>Monto Mensual</th>
                        <th>Día Pago</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="contrato : ${contratos}">
                        <td th:text="${contrato.id}"></td>
                        <td th:text="${contrato.propiedadDireccion}"></td>
                        <td th:text="${contrato.inquilinoNombre + ' ' + contrato.inquilinoApellido}"></td>
                        <td th:text="${#temporals.format(contrato.fechaInicio, 'dd/MM/yyyy')}"></td>
                        <td th:text="${contrato.duracionMeses}"></td>
                        <td th:text="${contrato.montoMensual}"></td>
                        <td th:text="${contrato.diaPago}"></td>
                        <td th:text="${contrato.estado}"></td>
                        <td>
                            <a th:href="@{'/contratos/' + ${contrato.id} + '/editar'}" 
                               class="btn btn-sm btn-outline-primary me-2">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <form th:action="@{'/contratos/' + ${contrato.id} + '/eliminar'}" 
                                  method="post" th:object="${contrato}" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('¿Seguro que deseas eliminar este contrato?');">
                                    <i class="bi bi-trash"></i> Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
