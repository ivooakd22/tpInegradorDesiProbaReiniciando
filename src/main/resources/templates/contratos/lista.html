<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Listado de Contratos')}"></head>
<body>

        <nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-5">
    <h2 class="mb-4">Listado de Contratos</h2>

    <!-- Mensajes -->
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtros -->
    <form th:action="@{/contratos/filtrar}" method="get" class="mb-4">
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" name="propiedad" class="form-control" placeholder="Propiedad">
            </div>
            <div class="col-md-3">
                <input type="text" name="inquilino" class="form-control" placeholder="Inquilino">
            </div>
            <div class="col-md-3">
                <select name="estado" class="form-select">
                    <option value="">-- Estado --</option>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="date" name="fechaInicio" class="form-control">
            </div>
            <div class="col-md-12 text-end mt-2">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search"></i> Filtrar
                </button>
            </div>
        </div>
    </form>

    <!-- Tabla de contratos -->
    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Propiedad</th>
            <th>Propietario</th>
            <th>Inquilino</th>
            <th>Fecha Inicio</th>
            <th>Importe Mensual</th>
            <th>Día Vencimiento</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contrato : ${contratos}">
            <td th:text="${contrato.id}"></td>
            <td th:text="${contrato.propiedadDireccion}"></td>
            <td th:text="${contrato.propietarioNombre}"></td>
            <td th:text="${contrato.inquilinoNombre}"></td>
            <td th:text="${#temporals.format(contrato.fechaInicio, 'dd/MM/yyyy')}"></td>
            <td th:text="${contrato.montoMensual}"></td>
            <td th:text="${contrato.diaPago}"></td>
            <td th:text="${contrato.estado}"></td>
            <td>
                <!-- Botón Editar -->
                <a th:href="@{'/contratos/' + ${contrato.id} + '/editar'}"
                    class="btn btn-warning btn-sm">
                    <i class="bi bi-pencil"></i> Editar
                </a>

                <!-- Botón Eliminar -->
                <form th:action="@{'/contratos/' + ${contrato.id} + '/eliminar'}"
                    method="post" style="display:inline">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('¿Seguro que deseas eliminar este contrato?');">
                        <i class="bi bi-trash"></i> Eliminar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Botón nuevo contrato -->
    <div class="mt-3">
        <a th:href="@{/contratos/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Nuevo Contrato
        </a>
    </div>
</div>

        <div th:replace="~{fragments/layout :: scripts}"></div>
    </body>
</html>
